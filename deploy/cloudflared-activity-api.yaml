# cloudflared tunnel exposing the Activity API to Cloudflare on its own hostname
# (activity-api.openshock.app) — no public IP / LoadBalancer required. Cloudflare proxies HTTP
# and WebSockets (SignalR) natively.
#
# Prereqs (run once, locally, with the cloudflared CLI):
#   cloudflared tunnel login
#   cloudflared tunnel create activity-api          # note the Tunnel UUID it prints
#   cloudflared tunnel route dns activity-api activity-api.openshock.app
# Then create the k8s secret from the generated credentials file:
#   kubectl -n openshock create secret generic activity-api-tunnel-credentials \
#     --from-file=credentials.json=$HOME/.cloudflared/<TUNNEL_UUID>.json
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: activity-api-tunnel-config
  namespace: openshock
data:
  config.yaml: |
    tunnel: activity-api
    credentials-file: /etc/cloudflared/creds/credentials.json
    # No-op metrics endpoint for liveness.
    metrics: 0.0.0.0:2000
    ingress:
      - hostname: activity-api.openshock.app
        service: http://activity-api:8080
      - service: http_status:404
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: activity-api-tunnel
  namespace: openshock
  labels:
    app: activity-api-tunnel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: activity-api-tunnel
  template:
    metadata:
      labels:
        app: activity-api-tunnel
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --config
            - /etc/cloudflared/config/config.yaml
            - run
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared/config
              readOnly: true
            - name: creds
              mountPath: /etc/cloudflared/creds
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: activity-api-tunnel-config
        - name: creds
          secret:
            secretName: activity-api-tunnel-credentials
---
# The API itself. Image build is out of scope here — point `image` at your registry build of
# OpenShock.Activity.Api. Secrets come from the `activity-api` Secret (see keys below).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: activity-api
  namespace: openshock
  labels:
    app: activity-api
spec:
  replicas: 1 # NOTE: RoomRegistry is in-memory. To scale >1, add a SignalR Redis backplane first.
  selector:
    matchLabels:
      app: activity-api
  template:
    metadata:
      labels:
        app: activity-api
    spec:
      containers:
        - name: activity-api
          image: ghcr.io/openshock/activity-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://0.0.0.0:8080
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            # Config binds the "Activity" section; __ maps to nested keys.
            - name: Activity__Discord__ClientId
              value: "1096380937496969326"
            - name: Activity__Discord__ClientSecret
              valueFrom:
                secretKeyRef: { name: activity-api, key: discord-client-secret }
            - name: Activity__Jwt__Key
              valueFrom:
                secretKeyRef: { name: activity-api, key: jwt-key }
            - name: Activity__Db__Conn
              valueFrom:
                secretKeyRef: { name: activity-api, key: db-conn }
---
apiVersion: v1
kind: Service
metadata:
  name: activity-api
  namespace: openshock
spec:
  selector:
    app: activity-api
  ports:
    - port: 8080
      targetPort: 8080
